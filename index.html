<!DOCTYPE html>
<html lang="fr"> 

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIS — Une voix à t'offrir</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#efe3cf;
font-family:Georgia,serif;
display:flex;
justify-content:center;
padding:25px;
}

.page{
width:100%;
max-width:720px;
}

.container{
position:relative;
}

.photo{
width:100%;
display:block;
border-radius:22px;
box-shadow:0 12px 35px rgba(0,0,0,.18);
}

/* Bouton lecture */

.play{
position:absolute;
left:50%;
top:43%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
border:none;
background:linear-gradient(#d7a144,#b77d1d);
color:white;
font-size:55px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
padding-left:8px;
box-shadow:
0 0 0 rgba(214,161,68,.6),
0 0 25px rgba(214,161,68,.55);

animation:pulse 2.5s infinite;
transition:.25s;
}

.play:hover{
transform:translate(-50%,-50%) scale(1.08);
}

@keyframes pulse{

0%{
box-shadow:
0 0 0 0 rgba(214,161,68,.55),
0 0 20px rgba(214,161,68,.45);
}

70%{
box-shadow:
0 0 0 22px rgba(214,161,68,0),
0 0 38px rgba(214,161,68,.6);
}

100%{
box-shadow:
0 0 0 0 rgba(214,161,68,0),
0 0 20px rgba(214,161,68,.45);
}

}

/* Logo UNIS */

.logo{
position:absolute;
right:7%;
bottom:7%;
width:82px;

animation:logo 4s ease-in-out infinite;
filter:drop-shadow(0 0 8px rgba(212,170,72,.35));
}

@keyframes logo{

0%{
transform:scale(1);
opacity:.88;
}

50%{
transform:scale(1.10);
opacity:1;
}

100%{
transform:scale(1);
opacity:.88;
}

}

</style>

</head>

<body>

<div class="page">

<div class="container">

<img
class="photo"
src="image_voix.png"
alt="Une voix à t'offrir">

<button
class="play"
onclick="animationLecture()"
id="play">

▶

</button>

<img
class="logo"
src="logoUNIS-transparent.png"
alt="Logo UNIS">

</div>

</div>

<script>

function animationLecture(){

const bouton=document.getElementById("play");

bouton.style.transform="translate(-50%,-50%) scale(0.92)";

setTimeout(function(){

bouton.style.transform="translate(-50%,-50%) scale(1.08)";

},120);

setTimeout(function(){

bouton.style.transform="translate(-50%,-50%)";

},250);

}

</script>

</body>

</html>
