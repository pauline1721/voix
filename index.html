<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIS — Une voix à t'offrir</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#efe3cf;
font-family:Georgia,serif;
display:flex;
justify-content:center;
padding:25px;
}

.page{
width:100%;
max-width:720px;
}

.container{
position:relative;
}

.photo{
width:100%;
display:block;
border-radius:22px;
box-shadow:0 12px 35px rgba(0,0,0,.18);
}

/* =======================
   Bouton Lecture
======================= */

.play{
position:absolute;
left:50%;
top:47.2%;
transform:translate(-50%,-50%);
width:104px;
height:104px;
border:none;
border-radius:50%;
background:linear-gradient(#d7a144,#b77d1d);
color:white;
font-size:48px;
padding-left:8px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 0 18px rgba(215,161,68,.55),
0 0 45px rgba(215,161,68,.35);

animation:pulse 2.5s infinite;
transition:.25s;
}

.play:hover{

transform:translate(-50%,-50%) scale(1.08);

}

@keyframes pulse{

0%{
box-shadow:
0 0 0 0 rgba(215,161,68,.55),
0 0 18px rgba(215,161,68,.35);
}

70%{
box-shadow:
0 0 0 20px rgba(215,161,68,0),
0 0 30px rgba(215,161,68,.45);
}

100%{
box-shadow:
0 0 0 0 rgba(215,161,68,0),
0 0 18px rgba(215,161,68,.35);
}

}

/* =======================
   Logo UNIS
======================= */

.logo{

position:absolute;

right:15%;
bottom:7.8%;

width:72px;

transform:rotate(-10deg);

filter:drop-shadow(0 3px 6px rgba(0,0,0,.18));

animation:logoRespire 4s ease-in-out infinite;

}

@keyframes logoRespire{

0%{
transform:rotate(-10deg) scale(1);
}

50%{
transform:rotate(-10deg) scale(1.08);
}

100%{
transform:rotate(-10deg) scale(1);
}

}

</style>

</head>

<body>

<div class="page">

<div class="container">

<img
class="photo"
src="image_voix.png"
alt="Une voix à t'offrir">

<button
class="play"
onclick="animationLecture()"
id="play">
▶
</button>

<img
class="logo"
src="logoUNIS-transparent.png"
alt="Logo UNIS">

</div>

</div>

<script>

function animationLecture(){

const bouton=document.getElementById("play");

bouton.style.transform="translate(-50%,-50%) scale(.92)";

setTimeout(function(){

bouton.style.transform="translate(-50%,-50%) scale(1.08)";

},120);

setTimeout(function(){

bouton.style.transform="translate(-50%,-50%)";

},260);

}

</script>

</body>

</html>
