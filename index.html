<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIS — Une voix à t'offrir</title>

<style> 
*{
  margin:0; 
  padding:0;
  box-sizing:border-box;
}

body{
  background:#efe3cf;
  font-family:Georgia,serif;
  display:flex;
  justify-content:center;
  padding:25px;
}

.page{
  width:100%;
  max-width:720px;
}

.container{
  position:relative;
}

.photo{
  width:100%;
  display:block;
  border-radius:22px;
  box-shadow:0 12px 35px rgba(0,0,0,.18);
}

/* BOUTON LECTURE */

.play{
  position:absolute;
  left:50%;
  top:49.5%;
  transform:translate(-50%,-50%);
  width:110px;
  height:110px;
  border:none;
  border-radius:50%;
  background:linear-gradient(#d7a144,#b77d1d);
  color:white;
  font-size:48px;
  padding-left:8px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:
    0 0 18px rgba(215,161,68,.55),
    0 0 45px rgba(215,161,68,.35);
  animation:pulse 2.5s infinite;
  transition:.25s;
}

.play.playing{
  padding-left:0;
  font-size:42px;
  animation:pulsePlaying 1.6s infinite;
}

@keyframes pulse{
  0%{
    box-shadow:
      0 0 0 0 rgba(215,161,68,.55),
      0 0 18px rgba(215,161,68,.35);
  }
  70%{
    box-shadow:
      0 0 0 20px rgba(215,161,68,0),
      0 0 30px rgba(215,161,68,.45);
  }
  100%{
    box-shadow:
      0 0 0 0 rgba(215,161,68,0),
      0 0 18px rgba(215,161,68,.35);
  }
}

@keyframes pulsePlaying{
  0%{
    box-shadow:
      0 0 0 0 rgba(215,161,68,.75),
      0 0 25px rgba(215,161,68,.55);
  }
  70%{
    box-shadow:
      0 0 0 24px rgba(215,161,68,0),
      0 0 45px rgba(215,161,68,.75);
  }
  100%{
    box-shadow:
      0 0 0 0 rgba(215,161,68,0),
      0 0 25px rgba(215,161,68,.55);
  }
}

/* LOGO SUR LE CAHIER */

.logo{
  position:absolute;
  right:25%;
  bottom:4%;
  width:70px;
  transform:rotate(-12deg);
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.18));
  animation:logoRespire 4s ease-in-out infinite;
}

@keyframes logoRespire{
  0%{
    transform:rotate(-12deg) scale(1);
  }
  50%{
    transform:rotate(-12deg) scale(1.08);
  }
  100%{
    transform:rotate(-12deg) scale(1);
  }
}
</style>
</head>

<body>

<div class="page">
  <div class="container">

    <img
      class="photo"
      src="image_voix.png"
      alt="Une voix à t'offrir">

    <button
      class="play"
      onclick="togglePlay()"
      id="playBtn"
      aria-label="Lire ou mettre en pause">
      ▶
    </button>

    <img
      class="logo"
      src="logoUNIS-transparent.png"
      alt="Logo UNIS">

    <audio id="audio" src="audio.mp3"></audio>

  </div>
</div>

<script>
let isPlaying = false;

const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

function togglePlay(){

  if(isPlaying === false){

    isPlaying = true;
    btn.textContent = "❚❚";
    btn.classList.add("playing");

    if(audio){
      audio.play().catch(function(){
        console.log("Audio pas encore disponible.");
      });
    }

  }else{

    isPlaying = false;
    btn.textContent = "▶";
    btn.classList.remove("playing");

    if(audio){
      audio.pause();
    }

  }
}

if(audio){
  audio.addEventListener("ended", function(){
    isPlaying = false;
    btn.textContent = "▶";
    btn.classList.remove("playing");
  });
}
</script>

</body>
</html>
