<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIS — Une voix à t'offrir</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#efe3cf;
  font-family:Georgia,serif;
}

.page{
  width:100%;
  max-width:720px;
  margin:0 auto;
}

.container{
  position:relative;
  width:100%;
}

.photo{
  width:100%;
  height:auto;
  display:block;
  border-radius:0;
  box-shadow:none;
}

.play{
  position:absolute;
  left:50%;
  top:49.5%;
  transform:translate(-50%,-50%);
  width:16%;
  aspect-ratio:1/1;
  border:none;
  border-radius:50%;
  background:linear-gradient(#d7a144,#b77d1d);
  color:white;
  font-size:clamp(28px,7vw,48px);
  padding-left:1%;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 18px rgba(215,161,68,.55),0 0 45px rgba(215,161,68,.35);
  animation:pulse 2.5s infinite;
}

.play.playing{
  padding-left:0;
  font-size:clamp(24px,6vw,42px);
}

@keyframes pulse{
  0%{ box-shadow:0 0 0 0 rgba(215,161,68,.55),0 0 18px rgba(215,161,68,.35); }
  70%{ box-shadow:0 0 0 20px rgba(215,161,68,0),0 0 30px rgba(215,161,68,.45); }
  100%{ box-shadow:0 0 0 0 rgba(215,161,68,0),0 0 18px rgba(215,161,68,.35); }
}

.logo{
  position:absolute;
  right:30%;
  bottom:5%;
  width:11%;
  transform:rotate(-12deg);
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.18));
  animation:logoRespire 4s ease-in-out infinite;
}

@keyframes logoRespire{
  0%{ transform:rotate(-12deg) scale(1); }
  50%{ transform:rotate(-12deg) scale(1.08); }
  100%{ transform:rotate(-12deg) scale(1); }
}
</style>
</head>

<body>

<div class="page">
  <div class="container">

    <img class="photo" src="image_voix.png" alt="Une voix à t'offrir">

    <button class="play" onclick="togglePlay()" id="playBtn">▶</button>

    <img class="logo" src="logoUNIS-transparent.png" alt="Logo UNIS">

    <audio id="audio" src="audio.mp3"></audio>

  </div>
</div>

<script>
let isPlaying = false;
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

function togglePlay(){
  if(!isPlaying){
    isPlaying = true;
    btn.textContent = "❚❚";
    btn.classList.add("playing");
    audio.play().catch(()=>{});
  }else{
    isPlaying = false;
    btn.textContent = "▶";
    btn.classList.remove("playing");
    audio.pause();
  }
}

audio.addEventListener("ended", function(){
  isPlaying = false;
  btn.textContent = "▶";
  btn.classList.remove("playing");
});
</script>

</body>
</html>
